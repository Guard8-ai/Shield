name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust Core Tests
  rust:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            shield-core/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cd shield-core && cargo fmt --check

      - name: Clippy
        run: cd shield-core && cargo clippy --all-features -- -D warnings

      - name: Run tests
        run: cd shield-core && cargo test --features async --verbose

      - name: Run tests (no default features)
        run: cd shield-core && cargo test --no-default-features --verbose

  # Device Fingerprint CLI
  fingerprint:
    name: Fingerprint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cd shield-core && cargo build --release --features cli

      - name: Run fingerprint command
        shell: bash
        run: |
          FP=$(./shield-core/target/release/shield fingerprint 2>/dev/null || true)
          echo "Fingerprint output: '$FP'"
          if [ -z "$FP" ]; then
            echo "WARN: fingerprint unavailable on this CI runner (expected for VMs)"
            exit 0
          fi
          # Validate: exactly 32 hex characters
          if echo "$FP" | grep -qE '^[0-9a-f]{32}$'; then
            echo "PASS: valid 32-char hex fingerprint"
          else
            echo "FAIL: unexpected format: '$FP'"
            exit 1
          fi

  # Python Tests
  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          cd python
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd python
          python -m pytest -v --tb=short

  # JavaScript Tests
  javascript:
    name: Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['16', '18', '20']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: javascript/package-lock.json

      - name: Install dependencies
        run: cd javascript && npm ci

      - name: Run tests
        run: cd javascript && npm test

  # Browser SDK Tests
  browser:
    name: Browser SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM package
        run: cd wasm && wasm-pack build --target web --out-dir ../browser/pkg --out-name shield_browser

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd browser && npm install

      - name: Run tests
        run: cd browser && npm test

  # Go Tests
  go:
    name: Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.24']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go/go.sum

      - name: Run tests
        run: cd go && go test -v ./...

  # Java Tests
  java:
    name: Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: cd java && gradle test --no-daemon

  # C Tests
  c:
    name: C (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build and test
        run: cd c && make test

  # Android Tests
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Android SDK
        run: |
          cd android
          gradle wrapper --no-daemon
          ./gradlew build --no-daemon

      - name: Run Android unit tests
        run: |
          cd android
          ./gradlew test --no-daemon

  # iOS Tests
  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Resolve iOS Simulator destination
        id: dest
        run: |
          # Find the first available iOS Simulator device
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "dest=platform=iOS Simulator,id=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $UDID"

      - name: Build iOS SDK
        run: |
          cd ios
          xcodebuild build -scheme Shield -destination '${{ steps.dest.outputs.dest }}'

      - name: Run iOS tests
        run: |
          cd ios
          xcodebuild test -scheme Shield -destination '${{ steps.dest.outputs.dest }}'

  # Cross-language Interoperability
  interop:
    name: Cross-Language Interop
    runs-on: ubuntu-latest
    needs: [rust, python, javascript, go]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: go/go.sum

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd python && pip install -e ".[dev]"
          cd ../javascript && npm ci

      - name: Run interop tests
        run: cd tests && python -m pytest test_interop.py -v

  # C# Tests
  csharp:
    name: C# (.NET ${{ matrix.dotnet }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        dotnet: ['8.0']
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Build
        run: cd csharp && dotnet build

      - name: Test
        run: cd csharp && dotnet test --verbosity normal

  # Swift Tests
  swift:
    name: Swift
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: cd swift && swift build

      - name: Test
        run: cd swift && swift test

  # Kotlin Tests
  kotlin:
    name: Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build and Test
        run: cd kotlin && gradle test --no-daemon

  # WASM Build
  wasm:
    name: WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: cd wasm && wasm-pack build --target web

      - name: Run WASM tests
        run: cd wasm && cargo test

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cd shield-core && cargo audit

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: HEAD
          extra_args: --only-verified

  # Coverage Report
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate Rust coverage
        run: |
          cd shield-core
          cargo llvm-cov --features async --lcov --output-path lcov.info

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate Python coverage
        run: |
          cd python
          pip install -e ".[dev]" pytest-cov
          python -m pytest --cov=shield --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: shield-core/lcov.info,python/coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
